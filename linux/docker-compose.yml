version: '3.8'
services:
  agent:
    build: .
    volumes:
      - shared:/shared
      - workspace:/workspace
    environment:
      - SHARED_DIR=/shared
      - REPORT_INTERVAL=${REPORT_INTERVAL:-600}
      - AWS_REGION=${AWS_REGION}
    command: ["python3", "src/main.py"]
    restart: unless-stopped

  bot:
    build: .
    volumes:
      - shared:/shared
      - workspace:/workspace:ro
      - ./serif.txt:/app/serif.txt:ro
      - ~/.aws:/root/.aws:ro
    environment:
      - TOKEN=${LINUX_BOT_TOKEN}
      - LINUX_BOT_TOKEN=${LINUX_BOT_TOKEN}
      - REPORT_CHANNEL=${REPORT_CHANNEL}
      - SHARED_DIR=/shared
      - AWS_REGION=${AWS_REGION}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
    command: ["python3", "src/bot.py"]
    restart: unless-stopped
    depends_on:
      - agent

volumes:
  shared:
  workspace:
